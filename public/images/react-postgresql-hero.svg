<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="reactGlow" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00d8ff"/>
      <stop offset="0.5" stop-color="#0088cc"/>
      <stop offset="1" stop-color="#005f99"/>
    </linearGradient>
    <linearGradient id="dbGlow" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#336791"/>
      <stop offset="1" stop-color="#23648a"/>
    </linearGradient>
    <linearGradient id="vm" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="vmPrivate" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#0d0d1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadowBox">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00d8ff" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- ===== LEFT SIDE: PUBLIC VM (React) ===== -->
  <g transform="translate(140, 100)" filter="url(#shadowBox)">
    <!-- Server rack shape -->
    <rect x="0" y="0" width="200" height="220" rx="12" fill="url(#vm)" stroke="#334155" stroke-width="1.5"/>
    <!-- Server top bar -->
    <rect x="0" y="0" width="200" height="32" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="0" y="16" width="200" height="16" fill="#1e293b"/>
    <!-- Status LED -->
    <circle cx="20" cy="16" r="4" fill="#00d8ff" filter="url(#glow)"/>
    <!-- Label -->
    <text x="56" y="20" fill="#00d8ff" font-family="monospace" font-size="11" font-weight="bold">PUBLIC VM</text>
    <!-- Server body content - React icon inside -->
    <g transform="translate(100, 110)">
      <!-- React atom orbits -->
      <ellipse cx="0" cy="0" rx="35" ry="12" fill="none" stroke="#00d8ff" stroke-width="1.5" opacity="0.6"/>
      <ellipse cx="0" cy="0" rx="35" ry="12" fill="none" stroke="#00d8ff" stroke-width="1.5" opacity="0.6" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="35" ry="12" fill="none" stroke="#00d8ff" stroke-width="1.5" opacity="0.6" transform="rotate(120)"/>
      <!-- Center dot -->
      <circle cx="0" cy="0" r="5" fill="#00d8ff" filter="url(#glow)"/>
    </g>
    <!-- IP badge -->
    <rect x="20" y="185" width="160" height="20" rx="4" fill="#00d8ff" fill-opacity="0.1" stroke="#00d8ff" stroke-width="0.5"/>
    <text x="100" y="198" fill="#00d8ff" font-family="monospace" font-size="10" text-anchor="middle">192.168.1.100</text>
  </g>

  <!-- ===== MIDDLE: INTERNET / ROUTER ===== -->
  <!-- Cloud icon -->
  <g transform="translate(500, 135)">
    <path d="M60 90 C60 70 75 55 95 55 C95 35 130 25 155 35 C170 15 215 15 230 35 C255 25 290 35 290 55 C310 55 325 70 325 90 Z" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="192" y="68" fill="#6366f1" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">ROUTER</text>
    <text x="192" y="82" fill="#9ca3af" font-family="monospace" font-size="9" text-anchor="middle">122.222.130.12</text>
  </g>

  <!-- ===== RIGHT SIDE: PRIVATE VM (PostgreSQL) ===== -->
  <g transform="translate(860, 100)" filter="url(#shadowBox)">
    <!-- Server rack shape -->
    <rect x="0" y="0" width="200" height="220" rx="12" fill="url(#vmPrivate)" stroke="#334155" stroke-width="1.5"/>
    <!-- Server top bar -->
    <rect x="0" y="0" width="200" height="32" rx="12" fill="#1a1a2e" stroke="#334155" stroke-width="1.5"/>
    <rect x="0" y="16" width="200" height="16" fill="#1a1a2e"/>
    <!-- Status LED (green = private) -->
    <circle cx="20" cy="16" r="4" fill="#10b981" filter="url(#glow)"/>
    <!-- Label -->
    <text x="44" y="20" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold">PRIVATE VM</text>
    <!-- PostgreSQL elephant -->
    <g transform="translate(100, 110)">
      <!-- Elephant silhouette -->
      <path d="M-15 15 L-15 -5 C-15 -20 0 -30 15 -30 L25 -30 L30 -20 L20 -15 L20 -5 L30 0 L35 -10 L45 -10 L40 5 L30 15 L25 25 L15 25 L10 15 L5 15 L0 25 L-10 25 L-15 15Z" fill="#336791" stroke="#23648a" stroke-width="0.5"/>
      <!-- Database cylinder top -->
      <ellipse cx="15" cy="-5" rx="28" ry="8" fill="#336791" stroke="#23648a" stroke-width="0.5"/>
      <!-- Database label -->
      <text x="15" y="32" fill="#48a9dc" font-family="monospace" font-size="9" text-anchor="middle">PostgreSQL</text>
    </g>
    <!-- IP badge -->
    <rect x="20" y="185" width="160" height="20" rx="4" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="0.5"/>
    <text x="100" y="198" fill="#10b981" font-family="monospace" font-size="10" text-anchor="middle">192.168.1.101</text>
  </g>

  <!-- ===== CONNECTION ARROWS ===== -->

  <!-- Public VM to Router (incoming from internet) -->
  <g opacity="0.7">
    <path d="M460 155 L500 155" stroke="#f59e0b" stroke-width="2"/>
    <polygon points="460,155 468,150 468,160" fill="#f59e0b"/>
    <text x="470" y="140" fill="#f59e0b" font-family="monospace" font-size="10" text-anchor="middle">HTTP/HTTPS</text>
  </g>

  <!-- Router to Public VM -->
  <g opacity="0.7">
    <path d="M500 175 L460 175" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="460,175 468,170 468,180" fill="#f59e0b"/>
  </g>

  <!-- Router to Internet (external) -->
  <g opacity="0.5">
    <path d="M700 155 L740 155" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="740,155 732,150 732,160" fill="#f59e0b"/>
    <text x="720" y="140" fill="#9ca3af" font-family="monospace" font-size="9" text-anchor="middle">Internet</text>
  </g>

  <!-- Public VM to Private VM (SSH Tunnel) -->
  <g opacity="0.8">
    <path d="M340 190 L860 190" stroke="#10b981" stroke-width="2" stroke-dasharray="8 4"/>
    <polygon points="860,190 850,184 850,196" fill="#10b981"/>
    <!-- SSH Tunnel label -->
    <rect x="520" y="175" width="160" height="20" rx="10" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="0.5"/>
    <text x="600" y="189" fill="#10b981" font-family="monospace" font-size="10" text-anchor="middle">SSH Tunnel (5432)</text>
  </g>

  <!-- Database query arrow (Public VM -> Private VM) -->
  <g opacity="0.6">
    <path d="M340 210 L860 210" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5 4"/>
    <polygon points="860,210 850,204 850,216" fill="#6366f1"/>
    <text x="600" y="225" fill="#6366f1" font-family="monospace" font-size="9" text-anchor="middle">SQL Queries</text>
  </g>

  <!-- ===== SECURITY / SSL ICONS ===== -->

  <!-- Lock icon (SSL) -->
  <g transform="translate(510, 260)">
    <rect x="0" y="10" width="20" height="16" rx="3" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
    <path d="M5 10 L5 6 C5 3 7 0 10 0 C13 0 15 3 15 6 L15 10" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="10" cy="17" r="2" fill="#f59e0b"/>
    <text x="10" y="35" fill="#f59e0b" font-family="monospace" font-size="9" text-anchor="middle">SSL</text>
  </g>

  <!-- Firewall icon -->
  <g transform="translate(710, 260)">
    <rect x="0" y="0" width="20" height="24" rx="4" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-width="1"/>
    <polygon points="10,3 17,8 17,16 10,21 3,16 3,8" fill="none" stroke="#6366f1" stroke-width="1"/>
    <text x="10" y="35" fill="#6366f1" font-family="monospace" font-size="9" text-anchor="middle">Firewall</text>
  </g>

  <!-- Database lock -->
  <g transform="translate(920, 50)">
    <ellipse cx="12" cy="5" rx="12" ry="5" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="0.8"/>
    <rect x="0" y="5" width="24" height="16" rx="2" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="0.8"/>
    <ellipse cx="12" cy="21" rx="12" ry="5" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="0.8"/>
    <text x="12" y="34" fill="#10b981" font-family="monospace" font-size="8" text-anchor="middle">Encrypted</text>
  </g>

  <!-- ===== PORT BADGES ===== -->
  <g transform="translate(470, 105)">
    <rect x="0" y="0" width="52" height="18" rx="3" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="26" y="13" fill="#f59e0b" font-family="monospace" font-size="9" text-anchor="middle">:80 :443</text>
  </g>
  <g transform="translate(470, 230)">
    <rect x="0" y="0" width="52" height="18" rx="3" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="0.5"/>
    <text x="26" y="13" fill="#10b981" font-family="monospace" font-size="9" text-anchor="middle">:5432</text>
  </g>
  <g transform="translate(885, 230)">
    <rect x="0" y="0" width="52" height="18" rx="3" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="0.5"/>
    <text x="26" y="13" fill="#10b981" font-family="monospace" font-size="9" text-anchor="middle">:5432</text>
  </g>

  <!-- ===== Nginx badge ===== -->
  <g transform="translate(115, 55)">
    <rect x="0" y="0" width="55" height="18" rx="8" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="0.5"/>
    <text x="27" y="13" fill="#6366f1" font-family="monospace" font-size="9" text-anchor="middle">Nginx</text>
  </g>

  <!-- ===== React badge ===== -->
  <g transform="translate(185, 55)">
    <rect x="0" y="0" width="55" height="18" rx="8" fill="#00d8ff" fill-opacity="0.15" stroke="#00d8ff" stroke-width="0.5"/>
    <text x="27" y="13" fill="#00d8ff" font-family="monospace" font-size="9" text-anchor="middle">React</text>
  </g>

  <!-- ===== Title section ===== -->
  <text x="600" y="340" fill="#ffffff" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="1">React + PostgreSQL Deployment</text>
  <text x="600" y="365" fill="#00d8ff" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" opacity="0.8">VMs • Firewalls • SSH Tunnels • SSL/TLS • Port Forwarding</text>
  <text x="600" y="385" fill="#6366f1" font-family="monospace" font-size="10" text-anchor="middle">Public VM (192.168.1.100) ⇄ Router (122.222.130.12) ⇄ Private VM (192.168.1.101)</text>
</svg>
