<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a2e"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="rnBlue" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#61dafb"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="iosGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="androidGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#ec4899"/>
      <stop offset="1" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.015" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/><line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/><line x1="800" y1="0" x2="800" y2="450"/>
    <line x1="900" y1="0" x2="900" y2="450"/><line x1="1000" y1="0" x2="1000" y2="450"/>
    <line x1="1100" y1="0" x2="1100" y2="450"/>
  </g>

  <!-- ===== A → Z JOURNEY (left) ===== -->
  <g transform="translate(30, 55)">
    <!-- Big A -->
    <rect x="0" y="0" width="80" height="80" rx="10" fill="#1a2332" stroke="#61dafb" stroke-width="2"/>
    <text x="40" y="52" fill="#61dafb" font-family="system-ui, sans-serif" font-size="38" font-weight="bold" text-anchor="middle">A</text>
    <line x1="8" y1="67" x2="72" y2="67" stroke="#61dafb" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="40" y="77" fill="#7dd3fc" font-family="monospace" font-size="7" text-anchor="middle">FUNDAMENTALS</text>

    <!-- Arrow -->
    <line x1="88" y1="40" x2="108" y2="40" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.15"/>
    <polygon points="111,40 104,36 104,44" fill="#ffffff" fill-opacity="0.15"/>

    <!-- Big Z -->
    <rect x="116" y="0" width="80" height="80" rx="10" fill="#1a2332" stroke="#f59e0b" stroke-width="2"/>
    <text x="156" y="52" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="38" font-weight="bold" text-anchor="middle">Z</text>
    <line x1="124" y1="67" x2="188" y2="67" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="156" y="77" fill="#fde68a" font-family="monospace" font-size="7" text-anchor="middle">PRODUCTION</text>

    <!-- TO text -->
    <text x="98" y="34" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">TO</text>
    <text x="98" y="48" fill="#555" font-family="monospace" font-size="7" text-anchor="middle">———</text>

    <!-- React Native logo (atom) -->
    <g transform="translate(20, 102)" opacity="0.8">
      <circle cx="20" cy="20" r="6" fill="#61dafb" filter="url(#glow)"/>
      <ellipse cx="20" cy="20" rx="18" ry="7" stroke="#61dafb" stroke-width="1.5" fill="none" opacity="0.5" transform="rotate(0 20 20)"/>
      <ellipse cx="20" cy="20" rx="18" ry="7" stroke="#61dafb" stroke-width="1.5" fill="none" opacity="0.5" transform="rotate(60 20 20)"/>
      <ellipse cx="20" cy="20" rx="18" ry="7" stroke="#61dafb" stroke-width="1.5" fill="none" opacity="0.5" transform="rotate(120 20 20)"/>
    </g>

    <!-- Platform badges -->
    <rect x="92" y="102" width="44" height="20" rx="4" fill="url(#iosGrad)" opacity="0.9"/>
    <text x="114" y="115" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">iOS</text>
    <rect x="92" y="128" width="44" height="20" rx="4" fill="url(#androidGrad)" opacity="0.9"/>
    <text x="114" y="141" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">Android</text>

    <!-- Cross platform text -->
    <text x="40" y="175" fill="#9ca3af" font-family="monospace" font-size="8" text-anchor="middle">Cross-Platform</text>
    <text x="40" y="187" fill="#9ca3af" font-family="monospace" font-size="8" text-anchor="middle">Single Codebase</text>
  </g>

  <!-- ===== CORE COMPONENTS PANEL ===== -->
  <g transform="translate(240, 55)">
    <text x="0" y="-5" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">CORE COMPONENTS</text>

    <rect x="0" y="0" width="130" height="22" rx="4" fill="#1a2332" stroke="#61dafb" stroke-width="0.5"/>
    <text x="8" y="15" fill="#7dd3fc" font-family="monospace" font-size="8">&lt;View /&gt;</text>

    <rect x="140" y="0" width="130" height="22" rx="4" fill="#1a2332" stroke="#61dafb" stroke-width="0.5"/>
    <text x="148" y="15" fill="#7dd3fc" font-family="monospace" font-size="8">&lt;Text /&gt;</text>

    <rect x="0" y="28" width="130" height="22" rx="4" fill="#1a2332" stroke="#61dafb" stroke-width="0.5"/>
    <text x="8" y="43" fill="#7dd3fc" font-family="monospace" font-size="8">&lt;Image /&gt;</text>

    <rect x="140" y="28" width="130" height="22" rx="4" fill="#1a2332" stroke="#61dafb" stroke-width="0.5"/>
    <text x="148" y="43" fill="#7dd3fc" font-family="monospace" font-size="8">&lt;ScrollView /&gt;</text>

    <rect x="0" y="56" width="130" height="22" rx="4" fill="#1a2332" stroke="#61dafb" stroke-width="0.5"/>
    <text x="8" y="71" fill="#7dd3fc" font-family="monospace" font-size="8">&lt;Pressable /&gt;</text>

    <rect x="140" y="56" width="130" height="22" rx="4" fill="#1a2332" stroke="#61dafb" stroke-width="0.5"/>
    <text x="148" y="71" fill="#7dd3fc" font-family="monospace" font-size="8">&lt;FlatList /&gt;</text>

    <rect x="0" y="84" width="130" height="22" rx="4" fill="#1a2332" stroke="#61dafb" stroke-width="0.5"/>
    <text x="8" y="99" fill="#7dd3fc" font-family="monospace" font-size="8">&lt;Modal /&gt;</text>

    <rect x="140" y="84" width="130" height="22" rx="4" fill="#1a2332" stroke="#61dafb" stroke-width="0.5"/>
    <text x="148" y="99" fill="#7dd3fc" font-family="monospace" font-size="8">&lt;TextInput /&gt;</text>

    <!-- Styling & Flexbox -->
    <rect x="0" y="118" width="270" height="28" rx="6" fill="#1a2332" stroke="#3b82f6" stroke-width="1"/>
    <text x="135" y="136" fill="#60a5fa" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">StyleSheet • Flexbox (Yoga) • Tailwind</text>

    <!-- Navigation -->
    <rect x="0" y="154" width="270" height="28" rx="6" fill="#1a2332" stroke="#8b5cf6" stroke-width="1"/>
    <text x="135" y="172" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">React Navigation • Deep Linking</text>
  </g>

  <!-- ===== MIDDLE: ARCHITECTURE DIAGRAM ===== -->
  <g transform="translate(550, 55)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="290" height="180" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="290" height="26" rx="10" fill="#1a2332"/>
    <rect x="0" y="16" width="290" height="10" fill="#1a2332"/>
    <text x="145" y="18" fill="#61dafb" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">ARCHITECTURE</text>

    <!-- JS Thread -->
    <rect x="15" y="36" width="260" height="26" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
    <text x="145" y="53" fill="#60a5fa" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">JavaScript Thread (Hermes / JSC)</text>

    <!-- Bridge / JSI -->
    <rect x="60" y="70" width="170" height="22" rx="5" fill="#3b1f4e" stroke="#8b5cf6" stroke-width="0.5"/>
    <text x="145" y="85" fill="#a78bfa" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">JSI Bridge (New Architecture)</text>

    <!-- Native Threads -->
    <rect x="15" y="100" width="120" height="26" rx="5" fill="#1e3a2f" stroke="#10b981" stroke-width="0.5"/>
    <text x="75" y="117" fill="#34d399" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">iOS (Obj-C/Swift)</text>

    <rect x="155" y="100" width="120" height="26" rx="5" fill="#3b2f1e" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="215" y="117" fill="#fbbf24" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">Android (Java/Kotlin)</text>

    <!-- Fabric Renderer -->
    <rect x="15" y="136" width="260" height="18" rx="4" fill="#1e2a3f" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="145" y="149" fill="#22d3ee" font-family="monospace" font-size="8" font-weight="bold" text-anchor="middle">Fabric Renderer • TurboModules • Codegen</text>

    <!-- Yoga Layout Engine -->
    <rect x="15" y="158" width="260" height="14" rx="3" fill="#2f1e3f" stroke="#ec4899" stroke-width="0.3"/>
    <text x="145" y="169" fill="#f472b6" font-family="monospace" font-size="7" text-anchor="middle">Yoga Layout Engine • Shadow Tree</text>
  </g>

  <!-- ===== STATE & DATA ===== -->
  <g transform="translate(860, 55)">
    <text x="0" y="-5" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">STATE &amp; DATA</text>

    <rect x="0" y="0" width="155" height="24" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <circle cx="10" cy="12" r="3" fill="#3b82f6"/>
    <text x="20" y="16" fill="#e0f2fe" font-family="monospace" font-size="10" font-weight="bold">useState / useReducer</text>

    <rect x="0" y="30" width="155" height="24" rx="4" fill="#1e3a2f" stroke="#10b981" stroke-width="1"/>
    <circle cx="10" cy="42" r="3" fill="#10b981"/>
    <text x="20" y="46" fill="#d1fae5" font-family="monospace" font-size="10" font-weight="bold">useContext</text>

    <rect x="0" y="60" width="155" height="24" rx="4" fill="#3b1f4e" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="10" cy="72" r="3" fill="#8b5cf6"/>
    <text x="20" y="76" fill="#e7d9ff" font-family="monospace" font-size="10" font-weight="bold">Zustand / Redux</text>

    <rect x="0" y="90" width="155" height="24" rx="4" fill="#3b2f1e" stroke="#f59e0b" stroke-width="1"/>
    <circle cx="10" cy="102" r="3" fill="#f59e0b"/>
    <text x="20" y="106" fill="#fef3c7" font-family="monospace" font-size="10" font-weight="bold">React Query</text>

    <rect x="0" y="120" width="155" height="24" rx="4" fill="#1e2a3f" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="10" cy="132" r="3" fill="#06b6d4"/>
    <text x="20" y="136" fill="#cffafe" font-family="monospace" font-size="10" font-weight="bold">Networking &amp; APIs</text>

    <rect x="0" y="150" width="155" height="24" rx="4" fill="#3b1e2f" stroke="#ec4899" stroke-width="1"/>
    <circle cx="10" cy="162" r="3" fill="#ec4899"/>
    <text x="20" y="166" fill="#fce7f3" font-family="monospace" font-size="10" font-weight="bold">AsyncStorage / SQLite</text>
  </g>

  <!-- ===== FEATURES & CAPABILITIES ===== -->
  <g transform="translate(240, 248)">
    <rect x="0" y="0" width="620" height="62" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="140" height="62" rx="6" fill="#1d4ed8"/>
    <text x="70" y="24" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">FEATURES</text>
    <text x="70" y="42" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">CAPABILITIES</text>

    <text x="155" y="20" fill="#f1f5f9" font-family="monospace" font-size="10">📱 Camera/Image Picker</text>
    <text x="340" y="20" fill="#f1f5f9" font-family="monospace" font-size="10">📍 Geolocation/Maps</text>
    <text x="155" y="40" fill="#f1f5f9" font-family="monospace" font-size="10">🔔 Push Notifications</text>
    <text x="340" y="40" fill="#f1f5f9" font-family="monospace" font-size="10">💳 In-App Purchases</text>
    <text x="155" y="56" fill="#f1f5f9" font-family="monospace" font-size="10">🎬 Reanimated/Gestures</text>
    <text x="340" y="56" fill="#f1f5f9" font-family="monospace" font-size="10">🔐 Security/Deep Links</text>
  </g>

  <!-- ===== BOTTOM STATS BAR ===== -->
  <g transform="translate(30, 330)">
    <rect x="0" y="0" width="1140" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="140" height="52" rx="8" fill="#1d4ed8"/>
    <text x="70" y="20" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">GUIDE</text>
    <text x="70" y="38" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">STATS</text>

    <!-- Stat 1 -->
    <text x="160" y="18" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold">23</text>
    <text x="160" y="38" fill="#9ca3af" font-family="monospace" font-size="8">Chapters</text>
    <line x1="240" y1="8" x2="240" y2="44" stroke="#334155" stroke-width="1"/>

    <!-- Stat 2 -->
    <text x="260" y="18" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold">50+</text>
    <text x="260" y="38" fill="#9ca3af" font-family="monospace" font-size="8">Code Examples</text>
    <line x1="370" y1="8" x2="370" y2="44" stroke="#334155" stroke-width="1"/>

    <!-- Stat 3 -->
    <text x="390" y="18" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold">100+</text>
    <text x="390" y="38" fill="#9ca3af" font-family="monospace" font-size="8">Commands</text>
    <line x1="490" y1="8" x2="490" y2="44" stroke="#334155" stroke-width="1"/>

    <!-- Stat 4 -->
    <text x="510" y="18" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold">15</text>
    <text x="510" y="38" fill="#9ca3af" font-family="monospace" font-size="8">Tables</text>
    <line x1="580" y1="8" x2="580" y2="44" stroke="#334155" stroke-width="1"/>

    <!-- Stat 5 -->
    <text x="600" y="18" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold">55</text>
    <text x="600" y="38" fill="#9ca3af" font-family="monospace" font-size="8">Minutes Read</text>
    <line x1="700" y1="8" x2="700" y2="44" stroke="#334155" stroke-width="1"/>

    <!-- Stat 6 -->
    <text x="720" y="18" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold">2</text>
    <text x="720" y="38" fill="#9ca3af" font-family="monospace" font-size="8">Platforms</text>
  </g>

  <!-- ===== BOTTOM TOOLCHAIN BAR ===== -->
  <g transform="translate(30, 393)">
    <rect x="0" y="0" width="1140" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="140" height="44" rx="8" fill="#047857"/>
    <text x="70" y="18" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">TOOL</text>
    <text x="70" y="34" fill="#a7f3d0" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">CHAIN</text>

    <text x="160" y="16" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold">Stack</text>
    <text x="160" y="34" fill="#9ca3af" font-family="monospace" font-size="8">React Native 0.78  ·  Hermes  ·  Metro  ·  Reanimated  ·  Expo  ·  TypeScript  ·  Jest  ·  Detox</text>
  </g>

  <!-- ===== TITLE ===== -->
  <text x="600" y="450" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="1">React Native: The Complete A–Z Guide</text>
</svg>
