<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1120"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="tunnelGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#f6821f"/>
      <stop offset="1" stop-color="#eb6700"/>
    </linearGradient>
    <linearGradient id="cloudflareGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#f6821f"/>
      <stop stop-color="#f6821f" offset="0.3"/>
      <stop stop-color="#e06b10" offset="0.6"/>
      <stop offset="1" stop-color="#c05500"/>
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f6821f" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#f6821f" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#f6821f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#312e81"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="greenBadge" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#059669"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="blueBadge" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="amberBadge" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#d97706"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="orangeGlowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f6821f"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="450" fill="url(#grid)"/>
  </g>

  <!-- Orange glow across the middle -->
  <ellipse cx="600" cy="225" rx="500" ry="180" fill="url(#orangeGlow)"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f6821f" font-family="system-ui, sans-serif" font-size="20" font-weight="700" filter="url(#glow)">Cloudflare Tunnel Architecture</text>
  <text x="600" y="62" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Expose local apps without port forwarding — bypass CGNAT, firewalls, and NAT</text>

  <!-- ============ SECTION 1: Local Network ============ -->

  <!-- Local Network label -->
  <text x="180" y="100" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">YOUR LOCAL NETWORK</text>

  <!-- Local box -->
  <rect x="40" y="108" width="280" height="160" rx="10" fill="url(#boxGrad)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- VM icon -->
  <rect x="60" y="125" width="100" height="70" rx="8" fill="url(#boxGrad2)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="110" y="150" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="9" font-weight="600">UBUNTU VM</text>
  <text x="110" y="165" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="8">192.168.68.200</text>

  <!-- Nginx box inside VM -->
  <rect x="72" y="178" width="76" height="22" rx="4" fill="#047857" stroke="#10b981" stroke-width="1"/>
  <text x="110" y="193" text-anchor="middle" fill="#d1fae5" font-family="system-ui, sans-serif" font-size="9" font-weight="600">NGINX :81</text>

  <!-- App box -->
  <rect x="175" y="125" width="125" height="70" rx="8" fill="url(#boxGrad)" stroke="#334155" stroke-width="1.5"/>
  <text x="237" y="147" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Web App</text>
  <text x="237" y="162" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="8">Next.js / React</text>
  <text x="237" y="177" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="8">PostgreSQL</text>

  <!-- Arrow VM to App -->
  <line x1="160" y1="160" x2="175" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- TP-Link Deco label -->
  <rect x="60" y="210" width="100" height="22" rx="4" fill="url(#boxGrad)" stroke="#334155" stroke-width="1"/>
  <text x="110" y="224" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="8">TP-Link Deco</text>

  <!-- CGNAT label -->
  <rect x="175" y="210" width="100" height="22" rx="4" fill="#7c2d12" stroke="#c2410c" stroke-width="1"/>
  <text x="225" y="224" text-anchor="middle" fill="#fed7aa" font-family="system-ui, sans-serif" font-size="8">CGNAT (Blocked)</text>

  <!-- X mark on CGNAT -->
  <text x="280" y="222" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="16" font-weight="700">✗</text>

  <!-- Route blocked text -->
  <text x="180" y="275" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Port forwarding blocked by ISP</text>

  <!-- Short arrow to cloudflared -->
  <line x1="320" y1="130" x2="365" y2="130" stroke="#f6821f" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- ============ SECTION 2: cloudflared ============ -->

  <text x="480" y="100" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">CLOUDFLARE TUNNEL</text>

  <!-- cloudflared box -->
  <rect x="340" y="108" width="280" height="160" rx="10" fill="url(#boxGrad)" stroke="#f6821f" stroke-width="2" filter="url(#shadow)"/>

  <!-- cloudflared icon -->
  <rect x="358" y="120" width="90" height="50" rx="8" fill="#431407" stroke="#f6821f" stroke-width="1.5"/>
  <text x="403" y="143" text-anchor="middle" fill="#fed7aa" font-family="system-ui, sans-serif" font-size="10" font-weight="700">cloudflared</text>
  <text x="403" y="158" text-anchor="middle" fill="#f6821f" font-family="system-ui, sans-serif" font-size="8">Tunnel Daemon</text>

  <!-- Outbound arrow from cloudflared -->
  <line x1="448" y1="135" x2="490" y2="135" stroke="#f6821f" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Tunnel visualization - duct -->
  <path d="M 460 135 Q 480 115 500 120 Q 530 128 540 135 Q 550 142 560 135" stroke="#f6821f" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M 490 145 Q 510 130 540 140 Q 565 148 580 145" stroke="#f6821f" stroke-width="1.5" fill="none" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- Encrypted badge -->
  <rect x="365" y="185" width="100" height="20" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="415" y="198" text-anchor="middle" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="8">🔒 Encrypted</text>

  <!-- Outbound-only badge -->
  <rect x="365" y="212" width="100" height="20" rx="4" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="415" y="225" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="8">↑ Outbound Only</text>

  <!-- Always-on badge -->
  <rect x="475" y="185" width="100" height="20" rx="4" fill="#1c1917" stroke="#a8a29e" stroke-width="1"/>
  <text x="525" y="198" text-anchor="middle" fill="#a8a29e" font-family="system-ui, sans-serif" font-size="8">⟳ Always-on</text>

  <!-- No ports badge -->
  <rect x="475" y="212" width="100" height="20" rx="4" fill="#1c1917" stroke="#a8a29e" stroke-width="1"/>
  <text x="525" y="225" text-anchor="middle" fill="#a8a29e" font-family="system-ui, sans-serif" font-size="8">🚫 No ports open</text>

  <!-- Tunnel arrow to cloudflare edge -->
  <line x1="620" y1="160" x2="690" y2="160" stroke="#f6821f" stroke-width="3" marker-end="url(#arrowOrange)" filter="url(#orangeGlow)"/>
  <text x="655" y="150" text-anchor="middle" fill="#f6821f" font-family="system-ui, sans-serif" font-size="8" filter="url(#glow)">Tunnel</text>
  <text x="655" y="142" text-anchor="middle" fill="#f6821f" font-family="system-ui, sans-serif" font-size="7" opacity="0.6">HTTPS</text>

  <!-- ============ SECTION 3: Cloudflare Edge ============ -->

  <text x="860" y="100" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">CLOUDFLARE NETWORK</text>

  <!-- Cloudflare edge box -->
  <rect x="690" y="108" width="340" height="160" rx="10" fill="#1c1917" stroke="#f6821f" stroke-width="2" filter="url(#shadow)"/>

  <!-- CF logo area -->
  <rect x="710" y="120" width="80" height="50" rx="8" fill="#431407" stroke="#f6821f" stroke-width="1.5"/>
  <text x="750" y="143" text-anchor="middle" fill="#fed7aa" font-family="system-ui, sans-serif" font-size="10" font-weight="700">Cloudflare</text>
  <text x="750" y="158" text-anchor="middle" fill="#f6821f" font-family="system-ui, sans-serif" font-size="8">Edge Network</text>

  <!-- Features -->
  <rect x="805" y="120" width="100" height="22" rx="4" fill="url(#greenBadge)"/>
  <text x="855" y="134" text-anchor="middle" fill="#d1fae5" font-family="system-ui, sans-serif" font-size="8" font-weight="600">HTTPS (SSL)</text>

  <rect x="805" y="148" width="100" height="22" rx="4" fill="url(#blueBadge)"/>
  <text x="855" y="162" text-anchor="middle" fill="#e0e7ff" font-family="system-ui, sans-serif" font-size="8" font-weight="600">DDoS Protection</text>

  <rect x="920" y="120" width="95" height="22" rx="4" fill="url(#boxGrad)" stroke="#334155" stroke-width="1"/>
  <text x="967" y="134" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="8">CDN Caching</text>

  <rect x="920" y="148" width="95" height="22" rx="4" fill="url(#boxGrad)" stroke="#334155" stroke-width="1"/>
  <text x="967" y="162" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="8">WAF Rules</text>

  <!-- DNS badge -->
  <rect x="710" y="185" width="130" height="22" rx="4" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="775" y="199" text-anchor="middle" fill="#c7d2fe" font-family="system-ui, sans-serif" font-size="8">DNS → CNAME Tunnel</text>

  <!-- Zero Trust badge -->
  <rect x="710" y="212" width="130" height="22" rx="4" fill="url(#boxGrad)" stroke="#334155" stroke-width="1"/>
  <text x="775" y="226" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="8">Zero Trust Access</text>

  <!-- Worldwide label -->
  <rect x="860" y="185" width="100" height="22" rx="4" fill="url(#amberBadge)"/>
  <text x="910" y="199" text-anchor="middle" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="8" font-weight="600">330+ Cities</text>

  <!-- Anycast badge -->
  <rect x="860" y="212" width="100" height="22" rx="4" fill="url(#boxGrad)" stroke="#334155" stroke-width="1"/>
  <text x="910" y="226" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="8">Anycast Network</text>

  <!-- Arrow from cloudflare to internet -->
  <line x1="1030" y1="160" x2="1080" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="1055" y="150" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="8">Proxy</text>

  <!-- ============ SECTION 4: Internet Users ============ -->

  <text x="1140" y="100" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">USERS</text>

  <!-- Internet users -->
  <rect x="1080" y="108" width="110" height="160" rx="10" fill="url(#boxGrad)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Mobile -->
  <rect x="1095" y="122" width="80" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="1135" y="137" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="8">📱 Mobile</text>
  <text x="1135" y="147" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="7">4G/5G</text>

  <!-- Browser -->
  <rect x="1095" y="162" width="80" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="1135" y="177" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="8">💻 Browser</text>
  <text x="1135" y="187" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="7">Desktop</text>

  <!-- API -->
  <rect x="1095" y="202" width="80" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="1135" y="217" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="8">🔌 API Client</text>
  <text x="1135" y="227" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="7">curl / Postman</text>

  <!-- Bottom feature badges -->
  <rect x="100" y="310" width="220" height="28" rx="6" fill="#1c1917" stroke="#f6821f" stroke-width="1.5"/>
  <text x="210" y="328" text-anchor="middle" fill="#f6821f" font-family="system-ui, sans-serif" font-size="11" font-weight="600">☁️ Cloudflare Tunnel</text>

  <rect x="340" y="310" width="180" height="28" rx="6" fill="#1c1917" stroke="#10b981" stroke-width="1.5"/>
  <text x="430" y="328" text-anchor="middle" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="11" font-weight="600">✓ Free Tier</text>

  <rect x="540" y="310" width="180" height="28" rx="6" fill="#1c1917" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="630" y="328" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="11" font-weight="600">✓ Custom Domain</text>

  <rect x="740" y="310" width="200" height="28" rx="6" fill="#1c1917" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="840" y="328" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="11" font-weight="600">✓ Automatic HTTPS</text>

  <!-- Installation command at bottom -->
  <rect x="60" y="365" width="1080" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="80" y="388" fill="#64748b" font-family="system-ui, sans-serif" font-size="9" font-weight="600">QUICK START (5 COMMANDS):</text>
  <text x="80" y="405" fill="#a5b4fc" font-family="monospace" font-size="11" font-weight="400">cloudflared tunnel login  →  cloudflared tunnel create my-app  →  cloudflared tunnel --url http://localhost:81</text>

  <!-- Bottom arrow labels -->
  <text x="655" y="300" text-anchor="middle" fill="#f6821f" font-family="system-ui, sans-serif" font-size="8" opacity="0.6">Encrypted Tunnel (outbound, no ports needed)</text>
</svg>
