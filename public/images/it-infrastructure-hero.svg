<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a1a"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="monoGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="twoGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="threeGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="netGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#ec4899"/>
      <stop offset="1" stop-color="#be185d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.015" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/><line x1="800" y1="0" x2="800" y2="450"/>
    <line x1="1000" y1="0" x2="1000" y2="450"/>
  </g>

  <!-- ===== SECTION LABELS (top) ===== -->
  <g transform="translate(30, 10)">
    <text x="0" y="14" fill="#3b82f6" font-family="monospace" font-size="10" font-weight="bold">ARCHITECTURE PATTERNS</text>
    <text x="200" y="14" fill="#06b6d4" font-family="monospace" font-size="10" font-weight="bold">NETWORKING</text>
    <text x="430" y="14" fill="#8b5cf6" font-family="monospace" font-size="10" font-weight="bold">INFRASTRUCTURE</text>
  </g>

  <!-- ===== 1. MONOLITHIC ARCHITECTURE (left) ===== -->
  <g transform="translate(30, 35)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="210" height="200" rx="8" fill="#1a2332" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="210" height="28" rx="8" fill="#1d4ed8"/>
    <rect x="0" y="16" width="210" height="12" fill="#1d4ed8"/>
    <text x="105" y="19" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">MONOLITHIC</text>

    <!-- App box -->
    <rect x="25" y="42" width="160" height="90" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="0.5"/>
    <text x="105" y="58" fill="#60a5fa" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">Single Application</text>
    
    <rect x="35" y="65" width="60" height="22" rx="3" fill="#1d4ed8" fill-opacity="0.3"/>
    <text x="65" y="79" fill="#93c5fd" font-family="monospace" font-size="7" text-anchor="middle">UI Layer</text>
    <rect x="35" y="90" width="60" height="22" rx="3" fill="#10b981" fill-opacity="0.3"/>
    <text x="65" y="104" fill="#6ee7b7" font-family="monospace" font-size="7" text-anchor="middle">Business Logic</text>
    <rect x="105" y="65" width="60" height="22" rx="3" fill="#06b6d4" fill-opacity="0.3"/>
    <text x="135" y="79" fill="#67e8f9" font-family="monospace" font-size="7" text-anchor="middle">Data Access</text>
    <rect x="105" y="90" width="60" height="22" rx="3" fill="#f59e0b" fill-opacity="0.3"/>
    <text x="135" y="104" fill="#fde68a" font-family="monospace" font-size="7" text-anchor="middle">Auth</text>
    
    <!-- Database -->
    <ellipse cx="105" cy="160" rx="55" ry="20" fill="#0f172a" stroke="#06b6d4" stroke-width="1"/>
    <text x="105" y="165" fill="#67e8f9" font-family="monospace" font-size="9" text-anchor="middle">database</text>
    <line x1="105" y1="132" x2="105" y2="140" stroke="#06b6d4" stroke-width="1"/>
    
    <!-- Arrow app -> db -->
    <line x1="105" y1="132" x2="105" y2="140" stroke="#06b6d4" stroke-width="1"/>

    <text x="105" y="192" fill="#9ca3af" font-family="monospace" font-size="8" text-anchor="middle">Single deployable unit</text>
  </g>

  <!-- ===== 2. TWO-TIER ARCHITECTURE (center-left) ===== -->
  <g transform="translate(260, 35)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="210" height="200" rx="8" fill="#1a2332" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="210" height="28" rx="8" fill="#047857"/>
    <rect x="0" y="16" width="210" height="12" fill="#047857"/>
    <text x="105" y="19" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">TWO-TIER</text>

    <!-- Client -->
    <rect x="25" y="42" width="160" height="45" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="0.5"/>
    <text x="105" y="55" fill="#34d399" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">CLIENT TIER</text>
    <rect x="40" y="63" width="45" height="16" rx="3" fill="#10b981" fill-opacity="0.2"/>
    <text x="62" y="74" fill="#6ee7b7" font-family="monospace" font-size="7" text-anchor="middle">UI</text>
    <rect x="90" y="63" width="45" height="16" rx="3" fill="#10b981" fill-opacity="0.2"/>
    <text x="112" y="74" fill="#6ee7b7" font-family="monospace" font-size="7" text-anchor="middle">App Logic</text>

    <!-- Arrow -->
    <line x1="105" y1="87" x2="105" y2="100" stroke="#10b981" stroke-width="1.5"/>
    <polygon points="105,102 101,96 109,96" fill="#10b981"/>

    <!-- Database -->
    <ellipse cx="105" cy="145" rx="55" ry="20" fill="#0f172a" stroke="#06b6d4" stroke-width="1"/>
    <text x="105" y="150" fill="#67e8f9" font-family="monospace" font-size="9" text-anchor="middle">DATABASE TIER</text>
    
    <rect x="25" y="175" width="160" height="18" rx="3" fill="#1a2332" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="105" y="187" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">Direct client ↔ DB communication</text>
  </g>

  <!-- ===== 3. THREE-TIER / MULTI-TIER (center-right) ===== -->
  <g transform="translate(490, 35)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="250" height="200" rx="8" fill="#1a2332" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="250" height="28" rx="8" fill="#d97706"/>
    <rect x="0" y="16" width="250" height="12" fill="#d97706"/>
    <text x="125" y="19" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">THREE-TIER / MULTI-TIER</text>

    <!-- Tier 1: Presentation -->
    <rect x="15" y="38" width="220" height="32" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="0.5"/>
    <rect x="15" y="38" width="80" height="32" rx="4" fill="#b45309"/>
    <text x="55" y="58" fill="#ffffff" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">TIER 1</text>
    <text x="120" y="55" fill="#fde68a" font-family="monospace" font-size="8">Presentation (UI)</text>
    <text x="120" y="65" fill="#9ca3af" font-family="monospace" font-size="7">React / Angular / Vue</text>

    <!-- Arrow -->
    <line x1="125" y1="70" x2="125" y2="82" stroke="#f59e0b" stroke-width="1.5"/>
    <polygon points="125,84 121,78 129,78" fill="#f59e0b"/>

    <!-- Tier 2: Application -->
    <rect x="15" y="88" width="220" height="32" rx="4" fill="#0f172a" stroke="#8b5cf6" stroke-width="0.5"/>
    <rect x="15" y="88" width="80" height="32" rx="4" fill="#6d28d9"/>
    <text x="55" y="108" fill="#ffffff" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">TIER 2</text>
    <text x="120" y="105" fill="#c4b5fd" font-family="monospace" font-size="8">Application (Logic)</text>
    <text x="120" y="115" fill="#9ca3af" font-family="monospace" font-size="7">Node.js / Java / .NET / Python</text>

    <!-- Arrow -->
    <line x1="125" y1="120" x2="125" y2="132" stroke="#8b5cf6" stroke-width="1.5"/>
    <polygon points="125,134 121,128 129,128" fill="#8b5cf6"/>

    <!-- Tier 3: Database -->
    <rect x="15" y="138" width="220" height="32" rx="4" fill="#0f172a" stroke="#06b6d4" stroke-width="0.5"/>
    <rect x="15" y="138" width="80" height="32" rx="4" fill="#0891b2"/>
    <text x="55" y="158" fill="#ffffff" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">TIER 3</text>
    <text x="120" y="155" fill="#67e8f9" font-family="monospace" font-size="8">Database (Storage)</text>
    <text x="120" y="165" fill="#9ca3af" font-family="monospace" font-size="7">PostgreSQL / MySQL / MongoDB</text>

    <!-- Additional tier indicator -->
    <text x="125" y="192" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">+ Cache, CDN, Queue (N-tier)</text>
  </g>

  <!-- ===== 4. NETWORK CONSIDERATIONS (right side) ===== -->
  <g transform="translate(760, 35)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="410" height="200" rx="8" fill="#1a2332" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="410" height="28" rx="8" fill="#be185d"/>
    <rect x="0" y="16" width="410" height="12" fill="#be185d"/>
    <text x="205" y="19" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">NETWORK CONSIDERATIONS</text>

    <!-- Firewall box -->
    <rect x="15" y="38" width="120" height="70" rx="4" fill="#0f172a" stroke="#ec4899" stroke-width="0.5"/>
    <text x="75" y="55" fill="#f472b6" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">Firewall</text>
    <text x="75" y="70" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">Allow / Deny Rules</text>
    <text x="75" y="85" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">Port ACLs</text>
    <text x="75" y="100" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">WAF</text>

    <!-- Load Balancer box -->
    <rect x="145" y="38" width="120" height="70" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="205" y="55" fill="#fbbf24" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">Load Balancer</text>
    <text x="205" y="70" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">Round Robin</text>
    <text x="205" y="85" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">Least Connections</text>
    <text x="205" y="100" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">Health Checks</text>

    <!-- DNS box -->
    <rect x="275" y="38" width="120" height="70" rx="4" fill="#0f172a" stroke="#8b5cf6" stroke-width="0.5"/>
    <text x="335" y="55" fill="#a78bfa" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">DNS</text>
    <text x="335" y="70" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">A / CNAME Records</text>
    <text x="335" y="85" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">TTL Caching</text>
    <text x="335" y="100" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">Geo-DNS</text>

    <!-- Network flow diagram -->
    <text x="205" y="125" fill="#ffffff" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">Network Flow</text>
    
    <rect x="20" y="135" width="85" height="40" rx="4" fill="#1d4ed8" fill-opacity="0.3" stroke="#3b82f6" stroke-width="0.5"/>
    <text x="62" y="155" fill="#60a5fa" font-family="monospace" font-size="8" text-anchor="middle">Public</text>
    <text x="62" y="168" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">Internet</text>

    <text x="120" y="158" fill="#f59e0b" font-family="monospace" font-size="12">→</text>

    <rect x="135" y="135" width="85" height="40" rx="4" fill="#6d28d9" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="0.5"/>
    <text x="177" y="155" fill="#c4b5fd" font-family="monospace" font-size="8" text-anchor="middle">Private</text>
    <text x="177" y="168" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">Subnet</text>

    <text x="235" y="158" fill="#f59e0b" font-family="monospace" font-size="12">→</text>

    <rect x="250" y="135" width="85" height="40" rx="4" fill="#047857" fill-opacity="0.3" stroke="#10b981" stroke-width="0.5"/>
    <text x="292" y="155" fill="#34d399" font-family="monospace" font-size="8" text-anchor="middle">Database</text>
    <text x="292" y="168" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">Layer</text>

    <text x="350" y="158" fill="#f59e0b" font-family="monospace" font-size="12">→</text>

    <rect x="365" y="135" width="35" height="40" rx="4" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="382" y="158" fill="#fde68a" font-family="monospace" font-size="8" text-anchor="middle">...</text>
  </g>

  <!-- ===== BOTTOM SECTION: Hardware/VM & Storage & OS ===== -->
  <g transform="translate(30, 255)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="1140" height="125" rx="8" fill="#1a2332" stroke="#334155" stroke-width="1"/>

    <!-- Section header -->
    <rect x="0" y="0" width="1140" height="28" rx="8" fill="#1a2332"/>
    <rect x="0" y="16" width="1140" height="12" fill="#1a2332"/>
    <text x="570" y="19" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">HARDWARE / VM SIZING • DATA STORAGE • OPERATING SYSTEMS</text>

    <!-- Hardware/VM Sizing -->
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="350" height="75" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="0.5"/>
      <text x="10" y="18" fill="#60a5fa" font-family="monospace" font-size="9" font-weight="bold">Hardware &amp; VM Sizing</text>
      
      <rect x="10" y="28" width="155" height="18" rx="3" fill="#1d4ed8" fill-opacity="0.2"/>
      <text x="15" y="40" fill="#93c5fd" font-family="monospace" font-size="7">vCPU: 2-64 cores</text>
      <rect x="175" y="28" width="165" height="18" rx="3" fill="#1d4ed8" fill-opacity="0.2"/>
      <text x="180" y="40" fill="#93c5fd" font-family="monospace" font-size="7">RAM: 4 GB - 512 GB</text>
      <rect x="10" y="50" width="155" height="18" rx="3" fill="#1d4ed8" fill-opacity="0.2"/>
      <text x="15" y="62" fill="#93c5fd" font-family="monospace" font-size="7">Storage: 20 GB - 10 TB</text>
      <rect x="175" y="50" width="165" height="18" rx="3" fill="#1d4ed8" fill-opacity="0.2"/>
      <text x="180" y="62" fill="#93c5fd" font-family="monospace" font-size="7">Network Throughput: 1-100 Gbps</text>
    </g>

    <!-- Data Storage -->
    <g transform="translate(395, 40)">
      <rect x="0" y="0" width="350" height="75" rx="6" fill="#0f172a" stroke="#06b6d4" stroke-width="0.5"/>
      <text x="10" y="18" fill="#67e8f9" font-family="monospace" font-size="9" font-weight="bold">Data Storage</text>
      
      <rect x="10" y="28" width="155" height="18" rx="3" fill="#0891b2" fill-opacity="0.2"/>
      <text x="15" y="40" fill="#67e8f9" font-family="monospace" font-size="7">Block (SSD/HDD)</text>
      <rect x="175" y="28" width="165" height="18" rx="3" fill="#0891b2" fill-opacity="0.2"/>
      <text x="180" y="40" fill="#67e8f9" font-family="monospace" font-size="7">File (NFS, CIFS, S3)</text>
      <rect x="10" y="50" width="155" height="18" rx="3" fill="#0891b2" fill-opacity="0.2"/>
      <text x="15" y="62" fill="#67e8f9" font-family="monospace" font-size="7">Object Storage</text>
      <rect x="175" y="50" width="165" height="18" rx="3" fill="#0891b2" fill-opacity="0.2"/>
      <text x="180" y="62" fill="#67e8f9" font-family="monospace" font-size="7">RAID: 0, 1, 5, 6, 10</text>
    </g>

    <!-- Operating Systems -->
    <g transform="translate(770, 40)">
      <rect x="0" y="0" width="350" height="75" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="0.5"/>
      <text x="10" y="18" fill="#34d399" font-family="monospace" font-size="9" font-weight="bold">Operating Systems</text>
      
      <rect x="10" y="28" width="155" height="18" rx="3" fill="#047857" fill-opacity="0.2"/>
      <text x="15" y="40" fill="#6ee7b7" font-family="monospace" font-size="7">Ubuntu / Debian</text>
      <rect x="175" y="28" width="165" height="18" rx="3" fill="#047857" fill-opacity="0.2"/>
      <text x="180" y="40" fill="#6ee7b7" font-family="monospace" font-size="7">RHEL / Rocky / Alma</text>
      <rect x="10" y="50" width="155" height="18" rx="3" fill="#047857" fill-opacity="0.2"/>
      <text x="15" y="62" fill="#6ee7b7" font-family="monospace" font-size="7">Windows Server</text>
      <rect x="175" y="50" width="165" height="18" rx="3" fill="#047857" fill-opacity="0.2"/>
      <text x="180" y="62" fill="#6ee7b7" font-family="monospace" font-size="7">Alpine / Minimal Images</text>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="434" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="1">IT Infrastructure</text>
  <text x="600" y="450" fill="#f59e0b" font-family="monospace" font-size="11" text-anchor="middle">Concepts · Design · Build</text>
</svg>
