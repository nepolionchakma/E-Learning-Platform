<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0a1a"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="pgGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#336791"/>
      <stop offset="1" stop-color="#1a4a6b"/>
    </linearGradient>
    <linearGradient id="valkeyGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="patroniGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="sentinelGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.012" stroke-width="1">
    <line x1="0" y1="70" x2="1200" y2="70"/><line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="350" x2="1200" y2="350"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="490" x2="1200" y2="490"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Title Section -->
  <text x="600" y="42" fill="#ffffff" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="1">High Availability &amp; Scaling</text>
  <text x="600" y="70" fill="#a78bfa" font-family="monospace" font-size="14" text-anchor="middle">PostgreSQL with Patroni + etcd  •  Valkey with Sentinel + Cluster</text>

  <!-- ===== LEFT SIDE: PostgreSQL HA ===== -->
  <g transform="translate(30, 90)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="555" height="320" rx="12" fill="#1a2332" stroke="#336791" stroke-width="1.5"/>
    <rect x="0" y="0" width="555" height="40" rx="12" fill="#1a2a3a"/>
    <rect x="0" y="28" width="555" height="12" fill="#1a2a3a"/>
    
    <!-- Elephant icon -->
    <circle cx="22" cy="20" r="10" fill="#336791" fill-opacity="0.3" stroke="#336791" stroke-width="1"/>
    <text x="22" y="25" fill="#48a9dc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">P</text>
    <text x="40" y="25" fill="#48a9dc" font-family="monospace" font-size="13" font-weight="bold">PostgreSQL High Availability</text>

    <!-- Architecture text -->
    <text x="277" y="60" fill="#9ca3af" font-family="monospace" font-size="10" text-anchor="middle">Patroni + etcd + HAProxy Architecture</text>

    <!-- Node 0 (Leader) -->
    <g transform="translate(20, 75)">
      <rect x="0" y="0" width="155" height="120" rx="6" fill="#0f172a" stroke="#336791" stroke-width="0.5"/>
      <rect x="0" y="0" width="155" height="22" rx="6" fill="#1a3a5a"/>
      <circle cx="12" cy="11" r="4" fill="#10b981" filter="url(#glow)"/>
      <text x="22" y="15" fill="#10b981" font-family="monospace" font-size="9" font-weight="bold">PRIMARY</text>
      <g transform="translate(77, 60)">
        <ellipse cx="0" cy="-8" rx="16" ry="4" fill="url(#pgGrad)" stroke="#23648a" stroke-width="0.6"/>
        <rect x="-16" y="-8" width="32" height="16" rx="2" fill="url(#pgGrad)" stroke="#23648a" stroke-width="0.6"/>
        <ellipse cx="0" cy="8" rx="16" ry="4" fill="url(#pgGrad)" stroke="#23648a" stroke-width="0.6"/>
      </g>
      <text x="77" y="88" fill="#48a9dc" font-family="monospace" font-size="7" text-anchor="middle">PostgreSQL</text>
      <rect x="15" y="96" width="55" height="14" rx="3" fill="url(#patroniGrad)" fill-opacity="0.15" stroke="#6366f1" stroke-width="0.4"/>
      <text x="42" y="106" fill="#818cf8" font-family="monospace" font-size="6" text-anchor="middle">Patroni</text>
      <rect x="80" y="96" width="55" height="14" rx="3" fill="url(#sentinelGrad)" fill-opacity="0.15" stroke="#06b6d4" stroke-width="0.4"/>
      <text x="107" y="106" fill="#22d3ee" font-family="monospace" font-size="6" text-anchor="middle">etcd</text>
    </g>

    <!-- Node 1 (Replica) -->
    <g transform="translate(200, 75)">
      <rect x="0" y="0" width="155" height="120" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <rect x="0" y="0" width="155" height="22" rx="6" fill="#1a2332"/>
      <circle cx="12" cy="11" r="4" fill="#6366f1"/>
      <text x="22" y="15" fill="#818cf8" font-family="monospace" font-size="9" font-weight="bold">REPLICA 1</text>
      <g transform="translate(77, 60)">
        <ellipse cx="0" cy="-8" rx="16" ry="4" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
        <rect x="-16" y="-8" width="32" height="16" rx="2" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
        <ellipse cx="0" cy="8" rx="16" ry="4" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
      </g>
      <text x="77" y="88" fill="#48a9dc" font-family="monospace" font-size="7" text-anchor="middle">PostgreSQL</text>
      <rect x="50" y="96" width="55" height="14" rx="3" fill="url(#patroniGrad)" fill-opacity="0.15" stroke="#6366f1" stroke-width="0.4"/>
      <text x="77" y="106" fill="#818cf8" font-family="monospace" font-size="6" text-anchor="middle">Patroni</text>
    </g>

    <!-- Node 2 (Replica) -->
    <g transform="translate(380, 75)">
      <rect x="0" y="0" width="155" height="120" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <rect x="0" y="0" width="155" height="22" rx="6" fill="#1a2332"/>
      <circle cx="12" cy="11" r="4" fill="#6366f1"/>
      <text x="22" y="15" fill="#818cf8" font-family="monospace" font-size="9" font-weight="bold">REPLICA 2</text>
      <g transform="translate(77, 60)">
        <ellipse cx="0" cy="-8" rx="16" ry="4" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
        <rect x="-16" y="-8" width="32" height="16" rx="2" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
        <ellipse cx="0" cy="8" rx="16" ry="4" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
      </g>
      <text x="77" y="88" fill="#48a9dc" font-family="monospace" font-size="7" text-anchor="middle">PostgreSQL</text>
      <rect x="50" y="96" width="55" height="14" rx="3" fill="url(#patroniGrad)" fill-opacity="0.15" stroke="#6366f1" stroke-width="0.4"/>
      <text x="77" y="106" fill="#818cf8" font-family="monospace" font-size="6" text-anchor="middle">Patroni</text>
    </g>

    <!-- Replication arrows -->
    <g opacity="0.5">
      <path d="M175 105 L200 105" stroke="#10b981" stroke-width="1.5"/>
      <polygon points="200,105 194,101 194,109" fill="#10b981"/>
      <path d="M175 95 L380 95" stroke="#10b981" stroke-width="1.5"/>
      <polygon points="380,95 374,91 374,99" fill="#10b981"/>
    </g>

    <!-- etcd communication -->
    <g opacity="0.4">
      <path d="M175 185 L200 185" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3 2"/>
      <path d="M355 185 L380 185" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="277" y="180" fill="#22d3ee" font-family="monospace" font-size="7" text-anchor="middle">etcd Cluster Communication</text>
    </g>

    <!-- HAProxy Layer -->
    <g transform="translate(20, 210)">
      <rect x="0" y="0" width="515" height="40" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="0.5"/>
      <circle cx="16" cy="20" r="5" fill="#f59e0b"/>
      <text x="28" y="24" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">LOAD BALANCER</text>
      <text x="170" y="24" fill="#9ca3af" font-family="monospace" font-size="9">HAProxy (Port 5000 RW / 5001 RO)</text>
      <text x="430" y="24" fill="#fbbf24" font-family="monospace" font-size="9">Auto-Discovery via Patroni API</text>
    </g>

    <!-- App Layer -->
    <g transform="translate(20, 260)">
      <rect x="0" y="0" width="515" height="40" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="0.5"/>
      <circle cx="16" cy="20" r="5" fill="#8b5cf6"/>
      <text x="28" y="24" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold">APPLICATION CLIENTS</text>
      <text x="250" y="24" fill="#9ca3af" font-family="monospace" font-size="9">Web Apps  •  API Services  •  Microservices</text>
    </g>
  </g>

  <!-- ===== RIGHT SIDE: Valkey HA ===== -->
  <g transform="translate(615, 90)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="555" height="320" rx="12" fill="#1a2332" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="0" y="0" width="555" height="40" rx="12" fill="#1a2a22"/>
    <rect x="0" y="28" width="555" height="12" fill="#1a2a22"/>
    
    <!-- Valkey icon -->
    <circle cx="22" cy="20" r="10" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="1"/>
    <text x="22" y="25" fill="#22c55e" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">V</text>
    <text x="40" y="25" fill="#22c55e" font-family="monospace" font-size="13" font-weight="bold">Valkey High Availability</text>

    <text x="277" y="60" fill="#9ca3af" font-family="monospace" font-size="10" text-anchor="middle">Sentinel / Cluster Architecture</text>

    <!-- Master -->
    <g transform="translate(200, 75)">
      <rect x="0" y="0" width="155" height="120" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="0.5"/>
      <rect x="0" y="0" width="155" height="22" rx="6" fill="#1a3a22"/>
      <circle cx="12" cy="11" r="4" fill="#10b981" filter="url(#glow)"/>
      <text x="22" y="15" fill="#10b981" font-family="monospace" font-size="9" font-weight="bold">MASTER</text>
      <g transform="translate(77, 60)">
        <polygon points="0,-12 18,-6 18,6 0,12 -18,6 -18,-6" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="0.8"/>
        <text x="0" y="4" fill="#22c55e" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">V</text>
      </g>
      <text x="77" y="88" fill="#86efac" font-family="monospace" font-size="7" text-anchor="middle">Valkey Primary</text>
      <rect x="15" y="96" width="120" height="14" rx="3" fill="url(#sentinelGrad)" fill-opacity="0.15" stroke="#f59e0b" stroke-width="0.4"/>
      <text x="75" y="106" fill="#fbbf24" font-family="monospace" font-size="6" text-anchor="middle">Sentinel Monitoring</text>
    </g>

    <!-- Replica 1 -->
    <g transform="translate(20, 75)">
      <rect x="0" y="0" width="155" height="120" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <rect x="0" y="0" width="155" height="22" rx="6" fill="#1a2332"/>
      <circle cx="12" cy="11" r="4" fill="#22c55e"/>
      <text x="22" y="15" fill="#86efac" font-family="monospace" font-size="9" font-weight="bold">REPLICA 1</text>
      <g transform="translate(77, 60)">
        <polygon points="0,-12 18,-6 18,6 0,12 -18,6 -18,-6" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="0.6"/>
      </g>
      <text x="77" y="88" fill="#86efac" font-family="monospace" font-size="7" text-anchor="middle">Valkey Replica</text>
    </g>

    <!-- Replica 2 -->
    <g transform="translate(380, 75)">
      <rect x="0" y="0" width="155" height="120" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <rect x="0" y="0" width="155" height="22" rx="6" fill="#1a2332"/>
      <circle cx="12" cy="11" r="4" fill="#22c55e"/>
      <text x="22" y="15" fill="#86efac" font-family="monospace" font-size="9" font-weight="bold">REPLICA 2</text>
      <g transform="translate(77, 60)">
        <polygon points="0,-12 18,-6 18,6 0,12 -18,6 -18,-6" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="0.6"/>
      </g>
      <text x="77" y="88" fill="#86efac" font-family="monospace" font-size="7" text-anchor="middle">Valkey Replica</text>
    </g>

    <!-- Replication arrows -->
    <g opacity="0.5">
      <path d="M175 105 L200 105" stroke="#22c55e" stroke-width="1.5"/>
      <polygon points="200,105 194,101 194,109" fill="#22c55e"/>
      <path d="M175 95 L380 95" stroke="#22c55e" stroke-width="1.5"/>
      <polygon points="380,95 374,91 374,99" fill="#22c55e"/>
    </g>

    <!-- Gossip Protocol text -->
    <g opacity="0.4">
      <text x="277" y="180" fill="#22d3ee" font-family="monospace" font-size="7" text-anchor="middle">Gossip Protocol • Quorum-based Failover</text>
    </g>

    <!-- Sentinel Layer -->
    <g transform="translate(20, 210)">
      <rect x="0" y="0" width="515" height="40" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="0.5"/>
      <circle cx="16" cy="20" r="5" fill="#f59e0b"/>
      <text x="28" y="24" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">SENTINEL / CLUSTER</text>
      <text x="190" y="24" fill="#9ca3af" font-family="monospace" font-size="9">Auto-Failover • Quorum: 2/3 • 16384 Hash Slots</text>
    </g>

    <!-- Client Layer -->
    <g transform="translate(20, 260)">
      <rect x="0" y="0" width="515" height="40" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="0.5"/>
      <circle cx="16" cy="20" r="5" fill="#8b5cf6"/>
      <text x="28" y="24" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold">SENTINEL-AWARE CLIENTS</text>
      <text x="260" y="24" fill="#9ca3af" font-family="monospace" font-size="9">Auto-Discover Master • Transparent Reconnect</text>
    </g>
    
    <!-- Cluster Slot Badge -->
    <g transform="translate(120, 205)">
      <rect x="0" y="0" width="300" height="0" rx="0" fill="none"/>
    </g>
  </g>

  <!-- ===== COMPARISON TABLE (Bottom) ===== -->
  <g transform="translate(30, 430)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="1140" height="185" rx="10" fill="#1a2332" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="1140" height="30" rx="10" fill="#1a2332"/>
    <rect x="0" y="18" width="1140" height="12" fill="#1a2332"/>
    <text x="570" y="20" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">COMPARISON: PostgreSQL vs Valkey HA Architectures</text>

    <!-- Table Header -->
    <g transform="translate(15, 45)">
      <rect x="0" y="0" width="1110" height="24" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <text x="10" y="16" fill="#fbbf24" font-family="monospace" font-size="9" font-weight="bold">FEATURE</text>
      <line x1="370" y1="0" x2="370" y2="24" stroke="#334155" stroke-width="0.5"/>
      <text x="380" y="16" fill="#48a9dc" font-family="monospace" font-size="9" font-weight="bold">POSTGRESQL (Patroni + etcd)</text>
      <line x1="740" y1="0" x2="740" y2="24" stroke="#334155" stroke-width="0.5"/>
      <text x="750" y="16" fill="#22c55e" font-family="monospace" font-size="9" font-weight="bold">VALKEY (Sentinel / Cluster)</text>
    </g>

    <!-- Row 1 -->
    <g transform="translate(15, 75)">
      <rect x="0" y="0" width="1110" height="22" rx="3" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
      <text x="10" y="15" fill="#9ca3af" font-family="monospace" font-size="8" font-weight="bold">Replication Type</text>
      <text x="380" y="15" fill="#93c5fd" font-family="monospace" font-size="8">WAL-based Physical Streaming</text>
      <text x="750" y="15" fill="#86efac" font-family="monospace" font-size="8">Command-based Logical (Async)</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(15, 101)">
      <rect x="0" y="0" width="1110" height="22" rx="3" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
      <text x="10" y="15" fill="#9ca3af" font-family="monospace" font-size="8" font-weight="bold">Failover Orchestrator</text>
      <text x="380" y="15" fill="#93c5fd" font-family="monospace" font-size="8">External: Patroni + etcd (Raft Consensus)</text>
      <text x="750" y="15" fill="#86efac" font-family="monospace" font-size="8">Built-in: Sentinel or Cluster Gossip</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(15, 127)">
      <rect x="0" y="0" width="1110" height="22" rx="3" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
      <text x="10" y="15" fill="#9ca3af" font-family="monospace" font-size="8" font-weight="bold">Consensus Mechanism</text>
      <text x="380" y="15" fill="#93c5fd" font-family="monospace" font-size="8">Leader Lock TTL via etcd (Raft)</text>
      <text x="750" y="15" fill="#86efac" font-family="monospace" font-size="8">Quorum-based Voting (SDOWN → ODOWN)</text>
    </g>

    <!-- Row 4 -->
    <g transform="translate(15, 153)">
      <rect x="0" y="0" width="1110" height="22" rx="3" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
      <text x="10" y="15" fill="#9ca3af" font-family="monospace" font-size="8" font-weight="bold">Scaling Strategy</text>
      <text x="380" y="15" fill="#93c5fd" font-family="monospace" font-size="8">Vertical (Scale-Up) + Read Replicas</text>
      <text x="750" y="15" fill="#86efac" font-family="monospace" font-size="8">Horizontal (Cluster: 16384 Shards)</text>
    </g>

    <!-- Row 5 -->
    <g transform="translate(15, 179)">
      <rect x="0" y="0" width="1110" height="22" rx="3" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
      <text x="10" y="15" fill="#9ca3af" font-family="monospace" font-size="8" font-weight="bold">Data RPO (Loss Window)</text>
      <text x="380" y="15" fill="#93c5fd" font-family="monospace" font-size="8">Zero (Sync Replication Available)</text>
      <text x="750" y="15" fill="#86efac" font-family="monospace" font-size="8">Sub-millisecond (Async Gap)</text>
    </g>
  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(30, 5)">
    <circle cx="8" cy="8" r="4" fill="#10b981" filter="url(#glow)"/>
    <text x="16" y="12" fill="#9ca3af" font-family="monospace" font-size="8">Primary/Leader</text>
    <circle cx="120" cy="8" r="4" fill="#6366f1"/>
    <text x="128" y="12" fill="#9ca3af" font-family="monospace" font-size="8">Replica/Standby</text>
    <line x1="240" y1="8" x2="256" y2="8" stroke="#10b981" stroke-width="1.5"/>
    <text x="260" y="12" fill="#9ca3af" font-family="monospace" font-size="8">Replication Stream</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="625" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" letter-spacing="1">Securing Production Infrastructure with High Availability Architecture</text>
</svg>
