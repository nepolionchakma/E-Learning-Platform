<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0a1a"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="nginxGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#009639"/>
      <stop offset="1" stop-color="#007a2e"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="450" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.015" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/><line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/><line x1="800" y1="0" x2="800" y2="450"/>
    <line x1="900" y1="0" x2="900" y2="450"/><line x1="1000" y1="0" x2="1000" y2="450"/>
    <line x1="1100" y1="0" x2="1100" y2="450"/>
  </g>

  <!-- ===== CENTRAL NGINX SERVER ===== -->
  <g transform="translate(370, 60)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="460" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="460" height="34" rx="12" fill="#1a2332"/>
    <rect x="0" y="20" width="460" height="14" fill="#1a2332"/>
    <circle cx="16" cy="17" r="5" fill="#10b981" filter="url(#glow)"/>
    <text x="36" y="22" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold">NGINX REVERSE PROXY &amp; LOAD BALANCER</text>

    <!-- Core Engine Box -->
    <rect x="30" y="50" width="400" height="42" rx="6" fill="#1a2332" stroke="#334155" stroke-width="0.5"/>
    <rect x="45" y="58" width="80" height="26" rx="4" fill="url(#nginxGrad)"/>
    <text x="85" y="75" fill="#ffffff" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">NGINX Core</text>
    <text x="140" y="75" fill="#6ee7b7" font-family="monospace" font-size="10">Event-Driven • Async • Non-Blocking</text>

    <!-- Feature chips -->
    <rect x="30" y="105" width="90" height="22" rx="4" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="0.5"/>
    <text x="75" y="119" fill="#34d399" font-family="monospace" font-size="9" text-anchor="middle">Reverse Proxy</text>
    <rect x="130" y="105" width="90" height="22" rx="4" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-width="0.5"/>
    <text x="175" y="119" fill="#818cf8" font-family="monospace" font-size="9" text-anchor="middle">Load Balancer</text>
    <rect x="230" y="105" width="90" height="22" rx="4" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="275" y="119" fill="#fbbf24" font-family="monospace" font-size="9" text-anchor="middle">SSL/TLS</text>
    <rect x="330" y="105" width="90" height="22" rx="4" fill="#ec4899" fill-opacity="0.12" stroke="#ec4899" stroke-width="0.5"/>
    <text x="375" y="119" fill="#f472b6" font-family="monospace" font-size="9" text-anchor="middle">HTTP Cache</text>

    <!-- Capabilities row 2 -->
    <rect x="30" y="135" width="90" height="22" rx="4" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="75" y="149" fill="#22d3ee" font-family="monospace" font-size="9" text-anchor="middle">WebSocket</text>
    <rect x="130" y="135" width="90" height="22" rx="4" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-width="0.5"/>
    <text x="175" y="149" fill="#a78bfa" font-family="monospace" font-size="9" text-anchor="middle">HTTP/2 + HTTP/3</text>
    <rect x="230" y="135" width="90" height="22" rx="4" fill="#f97316" fill-opacity="0.12" stroke="#f97316" stroke-width="0.5"/>
    <text x="275" y="149" fill="#fb923c" font-family="monospace" font-size="9" text-anchor="middle">Rate Limiting</text>
    <rect x="330" y="135" width="90" height="22" rx="4" fill="#14b8a6" fill-opacity="0.12" stroke="#14b8a6" stroke-width="0.5"/>
    <text x="375" y="149" fill="#2dd4bf" font-family="monospace" font-size="9" text-anchor="middle">Access Control</text>

    <!-- Port info -->
    <text x="230" y="180" fill="#9ca3af" font-family="monospace" font-size="10" text-anchor="middle">Port 80 (HTTP) • Port 443 (HTTPS) • Port 8080 (Admin)</text>
  </g>

  <!-- ===== UPSTREAM SERVERS ===== -->
  <!-- Backend 1 -->
  <g transform="translate(60, 290)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="160" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="160" height="28" rx="8" fill="#1a2332"/>
    <rect x="0" y="16" width="160" height="12" fill="#1a2332"/>
    <circle cx="12" cy="14" r="4" fill="#10b981"/>
    <text x="22" y="18" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold">BACKEND 1</text>
    <text x="80" y="52" fill="#9ca3af" font-family="monospace" font-size="11" text-anchor="middle">App Server</text>
    <text x="80" y="70" fill="#9ca3af" font-family="monospace" font-size="10" text-anchor="middle">10.0.0.10:3000</text>
    <rect x="30" y="84" width="100" height="20" rx="4" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="0.5"/>
    <text x="80" y="97" fill="#34d399" font-family="monospace" font-size="9" text-anchor="middle">Active</text>
  </g>

  <!-- Backend 2 -->
  <g transform="translate(280, 290)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="160" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="160" height="28" rx="8" fill="#1a2332"/>
    <rect x="0" y="16" width="160" height="12" fill="#1a2332"/>
    <circle cx="12" cy="14" r="4" fill="#10b981"/>
    <text x="22" y="18" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold">BACKEND 2</text>
    <text x="80" y="52" fill="#9ca3af" font-family="monospace" font-size="11" text-anchor="middle">App Server</text>
    <text x="80" y="70" fill="#9ca3af" font-family="monospace" font-size="10" text-anchor="middle">10.0.0.11:3000</text>
    <rect x="30" y="84" width="100" height="20" rx="4" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="0.5"/>
    <text x="80" y="97" fill="#34d399" font-family="monospace" font-size="9" text-anchor="middle">Active</text>
  </g>

  <!-- Backend 3 -->
  <g transform="translate(500, 290)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="160" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="160" height="28" rx="8" fill="#1a2332"/>
    <rect x="0" y="16" width="160" height="12" fill="#1a2332"/>
    <circle cx="12" cy="14" r="4" fill="#6366f1"/>
    <text x="22" y="18" fill="#818cf8" font-family="monospace" font-size="10" font-weight="bold">BACKEND 3</text>
    <text x="80" y="52" fill="#9ca3af" font-family="monospace" font-size="11" text-anchor="middle">App Server</text>
    <text x="80" y="70" fill="#9ca3af" font-family="monospace" font-size="10" text-anchor="middle">10.0.0.12:3000</text>
    <rect x="25" y="84" width="110" height="20" rx="4" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-width="0.5"/>
    <text x="80" y="97" fill="#818cf8" font-family="monospace" font-size="9" text-anchor="middle">Maintenance</text>
  </g>

  <!-- ===== STATIC FILES ===== -->
  <g transform="translate(720, 290)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="200" height="28" rx="8" fill="#1a2332"/>
    <rect x="0" y="16" width="200" height="12" fill="#1a2332"/>
    <circle cx="12" cy="14" r="4" fill="#f59e0b"/>
    <text x="22" y="18" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">STATIC FILES</text>
    <text x="100" y="52" fill="#9ca3af" font-family="monospace" font-size="11" text-anchor="middle">/var/www/html</text>
    <text x="100" y="70" fill="#9ca3af" font-family="monospace" font-size="10" text-anchor="middle">HTML • CSS • JS • Images</text>
    <rect x="25" y="84" width="150" height="20" rx="4" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="100" y="97" fill="#fbbf24" font-family="monospace" font-size="9" text-anchor="middle">Cache: 1h • Gzip: On</text>
  </g>

  <!-- ===== CONNECTION LINES: NGINX → BACKENDS ===== -->
  <g opacity="0.4">
    <path d="M230 260 L140 290" stroke="#10b981" stroke-width="1.5"/>
    <path d="M370 260 L360 290" stroke="#10b981" stroke-width="1.5"/>
    <path d="M510 260 L580 290" stroke="#10b981" stroke-width="1.5"/>
  </g>

  <!-- ===== CLIENT LAYER ===== -->
  <g transform="translate(370, 5)">
    <text x="0" y="12" fill="#f59e0b" font-family="monospace" font-size="10" font-weight="bold">INCOMING TRAFFIC</text>
  </g>

  <g opacity="0.6">
    <!-- Browsers -->
    <rect x="60" y="16" width="70" height="24" rx="12" fill="#334155" stroke="#475569" stroke-width="0.5"/>
    <text x="95" y="32" fill="#9ca3af" font-family="monospace" font-size="9" text-anchor="middle">🌐 Browser</text>
    <rect x="165" y="16" width="70" height="24" rx="12" fill="#334155" stroke="#475569" stroke-width="0.5"/>
    <text x="200" y="32" fill="#9ca3af" font-family="monospace" font-size="9" text-anchor="middle">📱 Mobile</text>
    <rect x="270" y="16" width="70" height="24" rx="12" fill="#334155" stroke="#475569" stroke-width="0.5"/>
    <text x="305" y="32" fill="#9ca3af" font-family="monospace" font-size="9" text-anchor="middle">🔧 API</text>

    <!-- Lines to NGINX -->
    <path d="M125 40 L125 60" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2"/>
    <path d="M200 40 L200 60" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2"/>
    <path d="M305 40 L305 60" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2"/>
  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(920, 290)">
    <text x="0" y="10" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">Protocols</text>
    <rect x="0" y="20" width="200" height="20" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="10" y="34" fill="#9ca3af" font-family="monospace" font-size="9">HTTP/1.1 • HTTP/2 • HTTP/3</text>
    <rect x="0" y="45" width="200" height="20" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="10" y="59" fill="#9ca3af" font-family="monospace" font-size="9">WebSocket • FastCGI • uwsgi • gRPC</text>
    <text x="0" y="85" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">Load Balancing</text>
    <rect x="0" y="95" width="200" height="20" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="10" y="109" fill="#9ca3af" font-family="monospace" font-size="9">Round Robin • Least Connections • IP Hash</text>
  </g>

  <!-- ===== Title ===== -->
  <text x="600" y="430" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="1">NGINX Setup &amp; Configuration</text>
  <text x="600" y="447" fill="#10b981" font-family="monospace" font-size="12" text-anchor="middle">Reverse Proxy • Load Balancer • SSL/TLS • Caching • Security</text>
</svg>
