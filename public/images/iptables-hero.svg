<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="shield" x1="500" y1="80" x2="700" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="flame" x1="580" y1="120" x2="620" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f97316"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Shield shape -->
  <path d="M600 80 L720 140 L720 220 C720 290 660 340 600 360 C540 340 480 290 480 220 L480 140 Z" fill="url(#shield)" opacity="0.15" filter="url(#softGlow)"/>
  <path d="M600 80 L720 140 L720 220 C720 290 660 340 600 360 C540 340 480 290 480 220 L480 140 Z" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <!-- Flame icon inside shield -->
  <path d="M600 140 C590 160 570 180 570 200 C570 220 585 235 600 235 C615 235 630 220 630 200 C630 180 610 160 600 140Z" fill="url(#flame)" filter="url(#glow)"/>
  <path d="M600 155 C595 170 585 185 585 195 C585 208 592 218 600 218 C608 218 615 208 615 195 C615 185 605 170 600 155Z" fill="#fbbf24" opacity="0.8"/>

  <!-- Incoming arrows (left side) -->
  <g opacity="0.7">
    <path d="M150 120 L350 160" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 4"/>
    <polygon points="350,160 340,152 342,165" fill="#ef4444"/>
    <text x="150" y="110" fill="#ef4444" font-family="monospace" font-size="14">INPUT</text>
    <text x="150" y="130" fill="#9ca3af" font-family="monospace" font-size="11">Incoming Traffic</text>
  </g>

  <g opacity="0.7">
    <path d="M150 200 L350 200" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 4"/>
    <polygon points="350,200 340,192 342,205" fill="#f59e0b"/>
    <text x="150" y="190" fill="#f59e0b" font-family="monospace" font-size="14">INPUT</text>
    <text x="150" y="210" fill="#9ca3af" font-family="monospace" font-size="11">SSH / HTTP</text>
  </g>

  <g opacity="0.7">
    <path d="M150 280 L350 240" stroke="#10b981" stroke-width="2" stroke-dasharray="6 4"/>
    <polygon points="350,240 340,232 342,245" fill="#10b981"/>
    <text x="150" y="270" fill="#10b981" font-family="monospace" font-size="14">INPUT</text>
    <text x="150" y="290" fill="#9ca3af" font-family="monospace" font-size="11">HTTPS</text>
  </g>

  <!-- Outgoing arrows (right side) -->
  <g opacity="0.7">
    <path d="M850 160 L1050 120" stroke="#6366f1" stroke-width="2" stroke-dasharray="6 4"/>
    <polygon points="1050,120 1040,128 1048,115" fill="#6366f1"/>
    <text x="1050" y="110" fill="#6366f1" font-family="monospace" font-size="14">OUTPUT</text>
    <text x="1030" y="130" fill="#9ca3af" font-family="monospace" font-size="11">Outgoing</text>
  </g>

  <g opacity="0.7">
    <path d="M850 200 L1050 200" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 4"/>
    <polygon points="1050,200 1040,192 1048,205" fill="#8b5cf6"/>
    <text x="1050" y="190" fill="#8b5cf6" font-family="monospace" font-size="14">OUTPUT</text>
    <text x="1020" y="210" fill="#9ca3af" font-family="monospace" font-size="11">Responses</text>
  </g>

  <g opacity="0.7">
    <path d="M850 240 L1050 280" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6 4"/>
    <polygon points="1050,280 1040,272 1048,285" fill="#a78bfa"/>
    <text x="1050" y="270" fill="#a78bfa" font-family="monospace" font-size="14">OUTPUT</text>
    <text x="1010" y="290" fill="#9ca3af" font-family="monospace" font-size="11">Updates</text>
  </g>

  <!-- FORWARD arrows (bottom) -->
  <g opacity="0.7">
    <path d="M480 320 L720 320" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6 4"/>
    <polygon points="720,320 710,312 712,325" fill="#06b6d4"/>
    <polygon points="480,320 490,312 488,325" fill="#06b6d4"/>
    <text x="560" y="350" fill="#06b6d4" font-family="monospace" font-size="14">FORWARD</text>
    <text x="550" y="370" fill="#9ca3af" font-family="monospace" font-size="11">Routing / Gateway</text>
  </g>

  <!-- Rule blocks floating -->
  <g opacity="0.6">
    <rect x="380" y="100" width="80" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="420" y="116" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">ACCEPT</text>
  </g>
  <g opacity="0.6">
    <rect x="740" y="130" width="80" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="780" y="146" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">DROP</text>
  </g>
  <g opacity="0.6">
    <rect x="380" y="260" width="80" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="420" y="276" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">REJECT</text>
  </g>
  <g opacity="0.6">
    <rect x="740" y="250" width="80" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="780" y="266" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">LOG</text>
  </g>

  <!-- Title text -->
  <text x="600" y="50" fill="#ffffff" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="2">iptables</text>
  <text x="600" y="395" fill="#6366f1" font-family="monospace" font-size="12" text-anchor="middle">Linux Firewall • Packet Filtering • Network Security</text>
</svg>
