<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0a1a"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="pgGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#336791"/>
      <stop offset="1" stop-color="#23648a"/>
    </linearGradient>
    <linearGradient id="patroniGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="etcdGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="haGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.015" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
    <line x1="800" y1="0" x2="800" y2="450"/>
    <line x1="900" y1="0" x2="900" y2="450"/>
    <line x1="1000" y1="0" x2="1000" y2="450"/>
    <line x1="1100" y1="0" x2="1100" y2="450"/>
  </g>

  <!-- ===== SINGLE VM HOST ===== -->
  <g transform="translate(20, 15)">
    <rect x="0" y="0" width="930" height="320" rx="14" fill="#0f172a" fill-opacity="0.6" stroke="#334155" stroke-width="1.5"/>
    <rect x="0" y="0" width="930" height="30" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="16" width="930" height="14" fill="#1e293b"/>
    <circle cx="16" cy="15" r="5" fill="#ef4444"/>
    <circle cx="32" cy="15" r="5" fill="#f59e0b"/>
    <circle cx="48" cy="15" r="5" fill="#10b981"/>
    <text x="465" y="19" fill="#64748b" font-family="monospace" font-size="11" text-anchor="middle">LINUX VM — SINGLE HOST</text>
  </g>

  <!-- ===== Loopback network label ===== -->
  <g transform="translate(40, 55)" opacity="0.4">
    <rect x="0" y="0" width="890" height="22" rx="6" fill="#0d47a1" fill-opacity="0.2" stroke="#1e63a8" stroke-width="0.8"/>
    <text x="445" y="15" fill="#60a5fa" font-family="monospace" font-size="10" text-anchor="middle">localhost (127.0.0.1) — Different Ports per Service</text>
  </g>

  <!-- ===== ETCD SERVICES ===== -->
  <!-- etcd1 -->
  <g transform="translate(40, 90)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="135" height="100" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <rect x="0" y="0" width="135" height="24" rx="8" fill="#0d2836"/>
    <rect x="0" y="14" width="135" height="10" fill="#0d2836"/>
    <circle cx="12" cy="12" r="3" fill="#22d3ee"/>
    <text x="20" y="16" fill="#22d3ee" font-family="monospace" font-size="9" font-weight="bold">etcd1</text>
    <rect x="20" y="30" width="95" height="18" rx="4" fill="url(#etcdGrad)" fill-opacity="0.15" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="67" y="43" fill="#22d3ee" font-family="monospace" font-size="9" text-anchor="middle">ETCD</text>
    <text x="67" y="60" fill="#9ca3af" font-family="monospace" font-size="8" text-anchor="middle">Cli: 12379</text>
    <text x="67" y="75" fill="#64748b" font-family="monospace" font-size="8" text-anchor="middle">Peer: 12380</text>
    <text x="67" y="92" fill="#64748b" font-family="monospace" font-size="7" text-anchor="middle">/var/lib/etcd/etcd1</text>
  </g>

  <!-- etcd2 -->
  <g transform="translate(190, 90)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="135" height="100" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <rect x="0" y="0" width="135" height="24" rx="8" fill="#0d2836"/>
    <rect x="0" y="14" width="135" height="10" fill="#0d2836"/>
    <circle cx="12" cy="12" r="3" fill="#22d3ee"/>
    <text x="20" y="16" fill="#22d3ee" font-family="monospace" font-size="9" font-weight="bold">etcd2</text>
    <rect x="20" y="30" width="95" height="18" rx="4" fill="url(#etcdGrad)" fill-opacity="0.15" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="67" y="43" fill="#22d3ee" font-family="monospace" font-size="9" text-anchor="middle">ETCD</text>
    <text x="67" y="60" fill="#9ca3af" font-family="monospace" font-size="8" text-anchor="middle">Cli: 22379</text>
    <text x="67" y="75" fill="#64748b" font-family="monospace" font-size="8" text-anchor="middle">Peer: 22380</text>
    <text x="67" y="92" fill="#64748b" font-family="monospace" font-size="7" text-anchor="middle">/var/lib/etcd/etcd2</text>
  </g>

  <!-- etcd3 -->
  <g transform="translate(340, 90)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="135" height="100" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <rect x="0" y="0" width="135" height="24" rx="8" fill="#0d2836"/>
    <rect x="0" y="14" width="135" height="10" fill="#0d2836"/>
    <circle cx="12" cy="12" r="3" fill="#22d3ee"/>
    <text x="20" y="16" fill="#22d3ee" font-family="monospace" font-size="9" font-weight="bold">etcd3</text>
    <rect x="20" y="30" width="95" height="18" rx="4" fill="url(#etcdGrad)" fill-opacity="0.15" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="67" y="43" fill="#22d3ee" font-family="monospace" font-size="9" text-anchor="middle">ETCD</text>
    <text x="67" y="60" fill="#9ca3af" font-family="monospace" font-size="8" text-anchor="middle">Cli: 32379</text>
    <text x="67" y="75" fill="#64748b" font-family="monospace" font-size="8" text-anchor="middle">Peer: 32380</text>
    <text x="67" y="92" fill="#64748b" font-family="monospace" font-size="7" text-anchor="middle">/var/lib/etcd/etcd3</text>
  </g>

  <!-- ===== ETCD cluster line ===== -->
  <g opacity="0.4">
    <path d="M175 140 L190 140" stroke="#06b6d4" stroke-width="1.5"/>
    <path d="M325 140 L340 140" stroke="#06b6d4" stroke-width="1.5"/>
  </g>
  <g transform="translate(255, 130)">
    <text x="0" y="10" fill="#22d3ee" font-family="monospace" font-size="8" text-anchor="middle" opacity="0.6">etcd Cluster — 3 Nodes (localhost, different ports)</text>
  </g>

  <!-- ===== PATRONI / PG SERVICES ===== -->
  <!-- patroni1 (Leader) -->
  <g transform="translate(500, 90)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="145" height="120" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <rect x="0" y="0" width="145" height="24" rx="8" fill="#0f2930"/>
    <rect x="0" y="14" width="145" height="10" fill="#0f2930"/>
    <circle cx="12" cy="12" r="4" fill="#10b981" filter="url(#glow)"/>
    <text x="22" y="16" fill="#10b981" font-family="monospace" font-size="9" font-weight="bold">patroni1</text>
    <g transform="translate(72, 42)">
      <ellipse cx="0" cy="-10" rx="16" ry="5" fill="url(#pgGrad)" stroke="#23648a" stroke-width="0.6"/>
      <rect x="-16" y="-10" width="32" height="20" rx="2" fill="url(#pgGrad)" stroke="#23648a" stroke-width="0.6"/>
      <ellipse cx="0" cy="10" rx="16" ry="5" fill="url(#pgGrad)" stroke="#23648a" stroke-width="0.6"/>
    </g>
    <text x="72" y="68" fill="#48a9dc" font-family="monospace" font-size="8" text-anchor="middle">PostgreSQL</text>
    <text x="72" y="80" fill="#818cf8" font-family="monospace" font-size="7" text-anchor="middle">Patroni</text>
    <text x="72" y="93" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">PG:15432 / REST:18081</text>
    <text x="72" y="105" fill="#64748b" font-family="monospace" font-size="7" text-anchor="middle">systemd: patroni1</text>
    <text x="72" y="117" fill="#64748b" font-family="monospace" font-size="7" text-anchor="middle">/var/lib/.../patroni1</text>
  </g>

  <!-- patroni2 (Replica) -->
  <g transform="translate(660, 90)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="145" height="120" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
    <rect x="0" y="0" width="145" height="24" rx="8" fill="#131429"/>
    <rect x="0" y="14" width="145" height="10" fill="#131429"/>
    <circle cx="12" cy="12" r="4" fill="#6366f1"/>
    <text x="22" y="16" fill="#818cf8" font-family="monospace" font-size="9" font-weight="bold">patroni2</text>
    <g transform="translate(72, 42)">
      <ellipse cx="0" cy="-10" rx="16" ry="5" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
      <rect x="-16" y="-10" width="32" height="20" rx="2" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
      <ellipse cx="0" cy="10" rx="16" ry="5" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
    </g>
    <text x="72" y="68" fill="#48a9dc" font-family="monospace" font-size="8" text-anchor="middle">PostgreSQL</text>
    <text x="72" y="80" fill="#818cf8" font-family="monospace" font-size="7" text-anchor="middle">Patroni</text>
    <text x="72" y="93" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">PG:15433 / REST:18082</text>
    <text x="72" y="105" fill="#64748b" font-family="monospace" font-size="7" text-anchor="middle">systemd: patroni2</text>
    <text x="72" y="117" fill="#64748b" font-family="monospace" font-size="7" text-anchor="middle">/var/lib/.../patroni2</text>
  </g>

  <!-- patroni3 (Replica) -->
  <g transform="translate(820, 90)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="145" height="120" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
    <rect x="0" y="0" width="145" height="24" rx="8" fill="#131429"/>
    <rect x="0" y="14" width="145" height="10" fill="#131429"/>
    <circle cx="12" cy="12" r="4" fill="#6366f1"/>
    <text x="22" y="16" fill="#818cf8" font-family="monospace" font-size="9" font-weight="bold">patroni3</text>
    <g transform="translate(72, 42)">
      <ellipse cx="0" cy="-10" rx="16" ry="5" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
      <rect x="-16" y="-10" width="32" height="20" rx="2" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
      <ellipse cx="0" cy="10" rx="16" ry="5" fill="#1e3a5f" stroke="#23648a" stroke-width="0.6"/>
    </g>
    <text x="72" y="68" fill="#48a9dc" font-family="monospace" font-size="8" text-anchor="middle">PostgreSQL</text>
    <text x="72" y="80" fill="#818cf8" font-family="monospace" font-size="7" text-anchor="middle">Patroni</text>
    <text x="72" y="93" fill="#9ca3af" font-family="monospace" font-size="7" text-anchor="middle">PG:15434 / REST:18083</text>
    <text x="72" y="105" fill="#64748b" font-family="monospace" font-size="7" text-anchor="middle">systemd: patroni3</text>
    <text x="72" y="117" fill="#64748b" font-family="monospace" font-size="7" text-anchor="middle">/var/lib/.../patroni3</text>
  </g>

  <!-- ===== REPLICATION ARROWS ===== -->
  <g opacity="0.5">
    <path d="M645 130 L660 130" stroke="#10b981" stroke-width="1.5"/>
    <polygon points="660,130 652,126 652,134" fill="#10b981"/>
  </g>
  <g opacity="0.5">
    <path d="M645 160 L820 160" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="820,160 812,156 812,164" fill="#10b981"/>
  </g>
  <g transform="translate(715, 148)">
    <text x="0" y="10" fill="#10b981" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.6">Streaming Replication (WAL)</text>
  </g>

  <!-- ===== HAPROXY SERVICE ===== -->
  <g transform="translate(40, 215)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="900" height="60" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
    <rect x="0" y="0" width="900" height="26" rx="10" fill="#1a2332"/>
    <rect x="0" y="14" width="900" height="12" fill="#1a2332"/>
    <circle cx="14" cy="13" r="4" fill="#f59e0b"/>
    <text x="26" y="17" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold">HAPROXY</text>
    <text x="450" y="17" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">/usr/sbin/haproxy — systemd: haproxy</text>
    <rect x="90" y="34" width="180" height="18" rx="4" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="180" y="47" fill="#fbbf24" font-family="monospace" font-size="9" text-anchor="middle">Port 5000 (Write → Leader)</text>
    <rect x="290" y="34" width="180" height="18" rx="4" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="380" y="47" fill="#fbbf24" font-family="monospace" font-size="9" text-anchor="middle">Port 5001 (Read → Replicas)</text>
    <rect x="490" y="34" width="180" height="18" rx="4" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="580" y="47" fill="#fbbf24" font-family="monospace" font-size="9" text-anchor="middle">Port 8404 (Stats Dashboard)</text>
    <rect x="690" y="34" width="190" height="18" rx="4" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="785" y="47" fill="#fbbf24" font-family="monospace" font-size="9" text-anchor="middle">/etc/haproxy/haproxy.cfg</text>
  </g>

  <!-- ===== CONNECTION LINES: Patroni → HAProxy ===== -->
  <g opacity="0.35">
    <path d="M72 210 L72 215" stroke="#f59e0b" stroke-width="1"/>
    <path d="M660 210 L400 215" stroke="#f59e0b" stroke-width="1"/>
    <path d="M820 210 L600 215" stroke="#f59e0b" stroke-width="1"/>
  </g>

  <!-- ===== LEGEND / STACK INFO ===== -->
  <g transform="translate(40, 300)">
    <text x="0" y="12" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">Service Stack</text>
    <rect x="0" y="20" width="70" height="20" rx="4" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="35" y="34" fill="#22d3ee" font-family="monospace" font-size="10" text-anchor="middle">3× etcd</text>
    <rect x="80" y="20" width="90" height="20" rx="4" fill="#336791" fill-opacity="0.15" stroke="#336791" stroke-width="0.5"/>
    <text x="125" y="34" fill="#48a9dc" font-family="monospace" font-size="10" text-anchor="middle">3× PostgreSQL</text>
    <rect x="180" y="20" width="80" height="20" rx="4" fill="url(#patroniGrad)" fill-opacity="0.15" stroke="#6366f1" stroke-width="0.5"/>
    <text x="220" y="34" fill="#818cf8" font-family="monospace" font-size="10" text-anchor="middle">3× Patroni</text>
    <rect x="270" y="20" width="80" height="20" rx="4" fill="url(#haGrad)" fill-opacity="0.15" stroke="#10b981" stroke-width="0.5"/>
    <text x="310" y="34" fill="#34d399" font-family="monospace" font-size="10" text-anchor="middle">1× HAProxy</text>
    <text x="430" y="34" fill="#9ca3af" font-family="monospace" font-size="10">7 systemd Services • 1 Linux VM • No Docker</text>
  </g>

  <!-- ===== FAILOVER / HA badge ===== -->
  <g transform="translate(820, 290)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="0.8"/>
    <text x="80" y="18" fill="#10b981" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Automatic Failover</text>
    <text x="80" y="34" fill="#9ca3af" font-family="monospace" font-size="9" text-anchor="middle">Leader Election • Self-Healing</text>
    <text x="80" y="47" fill="#64748b" font-family="monospace" font-size="8" text-anchor="middle">pg_rewind • Timeline Switch</text>
  </g>

  <!-- ===== Title ===== -->
  <text x="600" y="430" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="1">PostgreSQL HA on a Single VM</text>
  <text x="600" y="447" fill="#6366f1" font-family="monospace" font-size="12" text-anchor="middle">Patroni • etcd • HAProxy • Native Services • Auto-Failover</text>
</svg>
